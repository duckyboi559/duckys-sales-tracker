<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ducky's Sales Tracker</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="background"></div>

<div class="app">

<div class="header">
<img src="logo.png" class="logo">
<h1>Ducky's Street Dogs</h1>
<p>Sales Tracker</p>
</div>

<div class="card">
<h2>Bacon Dog</h2>
<div class="count" id="baconCount">0</div>
<div class="buttons">
<button onclick="changeCount('bacon', -1)">-1</button>
<button onclick="changeCount('bacon', 1)">+1</button>
</div>
<div class="money" id="baconTotal">$0</div>
</div>

<div class="card">
<h2>Quack Attack</h2>
<div class="count" id="quackCount">0</div>
<div class="buttons">
<button onclick="changeCount('quack', -1)">-1</button>
<button onclick="changeCount('quack', 1)">+1</button>
</div>
<div class="money" id="quackTotal">$0</div>
</div>

<div class="card">
<h2>Asada Fries</h2>
<div class="count" id="friesCount">0</div>
<div class="buttons">
<button onclick="changeCount('fries', -1)">-1</button>
<button onclick="changeCount('fries', 1)">+1</button>
</div>
<div class="money" id="friesTotal">$0</div>
</div>

<div class="totalBox">
<h2>Total</h2>
<div class="grand" id="grandTotal">$0</div>
</div>

<button class="reset" onclick="resetDay()">Reset Day</button>

</div>

<script src="script.js"></script>

</body>
</html>
